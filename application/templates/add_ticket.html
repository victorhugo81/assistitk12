<!-- add_ticket.html -->
{% extends 'base.html' %}
{% block content %}

<div class="row">
    <div class="col-12">        
        <div class="main-card-box card my-4">
            <!-- Card Header -->
            <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
        <div class="bg-gradient-main custom-title-card">
          <h2 class="text-white text-capitalize ps-3"><i class="material-symbols-rounded opacity-5">confirmation_number</i> Add New Ticket</h2>
                </div>
            </div>
            
            <div class="card-body px-0 pb-2">
                <form method="POST" action="{{ url_for('routes.add_ticket') }}" enctype="multipart/form-data" id="ticketForm">
                    {{ form.hidden_tag() }}

                    <div class="card-body px-0 pb-2">
                        <!-- Problem Category -->
                        <div class="ticket-content-box">
                            <h3><span aria-hidden="true" class="text-danger ms-1">*</span> Problem Category</h3>
                            <div class="input-group input-group-outline my-3">
                                <select name="title_id" class="form-select" required>
                                    <option value="" disabled selected>Select a category</option>
                                    {% for title in titles %}
                                        <option value="{{ title.id }}">{{ title.title_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <br>
                            <h3><span aria-hidden="true" class="text-danger ms-1">*</span> Description</h3>
                            <div class="input-group input-group-outline my-3">
                                <textarea name="initial_comment" class="form-control" style="height: 150px;" required></textarea>
                            </div>
                        </div>

                        <!-- Attachments -->
                        <div class="ticket-content-box">
                            <h3>Attachment</h3>
                            <div class="input-group-outline my-3">
                                <input type="file" name="attachment" class="form-control" 
                                       accept=".jpg,.jpeg,.png,.pdf" multiple>
                            </div>
                            <small class="text-muted">Allowed: JPG, PNG, PDF (Max 12MB)</small>
                            <div id="fileError" class="text-danger"></div>
                        </div>

                        <div class="input-group justify-content-end mt-4">
                            <button type="submit" class="btn bg-gradient-main">Submit Ticket</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('ticketForm').addEventListener('submit', function(e) {
    const fileInput = document.getElementById('attachment');
    const fileError = document.getElementById('fileError');
    
    if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const validTypes = ['image/jpeg', 'image/png', 'application/pdf'];
        const maxSize = 12 * 1024 * 1024; // 12MB

        if (!validTypes.includes(file.type)) {
            e.preventDefault();
            fileError.textContent = 'Only JPG, PNG, and PDF files are allowed.';
            return;
        }

        if (file.size > maxSize) {
            e.preventDefault();
            fileError.textContent = 'File size exceeds 12MB limit.';
            return;
        }
    }
});
</script>
{% endblock %}
